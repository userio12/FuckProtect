[versions]
agp = "8.13.0"
kotlin = "2.2.0"
core = "1.17.0"
appcompat = "1.7.1"
material = "1.13.0"
constraintlayout = "2.2.1"
picocli = "4.7.6"
zip4j = "2.11.5"
bouncycastle = "1.78.1"
kotlinxCoroutines = "1.8.1"
dexlib2 = "2.5.2"
commonsLang3 = "3.14.0"
commonsIo = "2.15.1"

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }

[libraries]
androidx-core = { group = "androidx.core", name = "core", version.ref = "core" }
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat" }
material = { group = "com.google.android.material", name = "material", version.ref = "material" }
androidx-constraintlayout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "constraintlayout" }
picocli = { group = "info.picocli", name = "picocli", version.ref = "picocli" }
zip4j = { group = "net.lingala.zip4j", name = "zip4j", version.ref = "zip4j" }
bouncycastle = { group = "org.bouncycastle", name = "bcpkix-jdk18on", version.ref = "bouncycastle" }
kotlinx-coroutines = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }
dexlib2 = { group = "org.smali", name = "dexlib2", version.ref = "dexlib2" }
commons-lang3 = { group = "org.apache.commons", name = "commons-lang3", version.ref = "commonsLang3" }
commons-io = { group = "commons-io", name = "commons-io", version.ref = "commonsIo" }
